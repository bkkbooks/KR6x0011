body:
  text: 如是語經歸命彼世尊應供正覺者一集第一品一一一一然我聞應供已説世尊説此諸比丘應斷一法我説汝等不再來之成就者何者一法諸比丘所謂貪法我説汝等不再來之成就者世尊説此義此處如是説貪焚有情依貪行惡勝觀之人正知斷貪斷於此世決不再來我聞世尊説此義二一一二我聞應供已説世尊説此諸比丘應斷一法我説汝等不再來之成就者何者一法諸比丘所謂瞋法我説汝等不再來之成就者世尊説此義此處如是説瞋之有情依瞋行惡勝觀之人正知斷瞋斷於此世決不再來我聞世尊説此義三一一三我聞應供已説世尊説此諸比丘應斷一法我説汝等不再來之成就者何者一法諸比丘所謂癡法我説汝等不再來之成就者世尊説此義此處如是説癡之有情依癡行惡勝觀之人正知斷癡斷於此世決不再來我聞世尊説此義四一一四我聞應供已説世尊説此諸比丘應斷一法我説汝等不再來之成就者何者一法諸比丘所謂忿法我説汝等不再來之成就者世尊説此義此處如是説忿之有情依忿行惡勝觀之人正知斷忿斷於此世決不再來我聞世尊説此義五一一五我聞應供已説世尊説此諸比丘應斷一法我説汝等不再來之成就者何者一法諸比丘所謂覆法我説法等不再來之成就者世尊説此義此處如是説覆之有情依覆行惡勝觀之人正知斷覆斷於此世決不再來我聞世尊説此義六一一六我聞應供已説世尊説此諸比丘應斷一法我説汝等不再來之成就者何者一法諸比丘所謂慢法我説汝等不再來之成就者世尊説此義此處如是説慢之有情依慢行惡勝觀之人正知斷慢斷於此世決不再來我聞世尊説此義七一一七我聞應供已説世尊説此諸比丘不通知不遍知一切不能自彼而拋棄不斷心者不能盡苦然則諸比丘通知一切遍知一切自彼而拋棄斷心者得盡苦世尊説此義此處如是説由一切知一切任何時不貪者彼實為持遍知得超越一切苦我聞世尊説此義八一一八我聞應供已説世尊説此諸比丘不通知不遍知慢不能自彼而拋棄不斷心者不能盡苦然則諸比丘通知遍知慢自彼而拋棄斷心者得盡苦世尊説此義此處如是説纏慢慢結諸人喜有不遍知慢即將轉生無慢斷慢而解脫者彼伏慢結越一切苦我聞世尊説此義九一一九我聞應供已説世尊説此諸比丘不通知不遍知貪不能自彼而拋棄不斷心者不能盡苦然則諸比丘通知遍知貪自彼而拋棄斷心者得盡苦世尊説此義此處如是説貪婪有情依貪行惡勝觀之人正知斷貪斷於此世決不再來我聞世尊説此義一一一一我聞應供已説世尊説此諸比丘不通知不遍知瞋不能自彼而拋棄不斷心者不能盡苦然則諸比丘通知遍知瞋自彼而拋棄斷心者得盡苦世尊説此義此處如是説瞋之有情依瞋行惡勝觀之人正知斷瞋斷於此世決不再來我聞世尊説此義成就者品第一攝頌曰貪一瞋二及癡三忿四覆五慢為六一切七慢八貪九瞋一更為二説謂第一品一集第二品一一一二一我聞應供已説世尊説此諸比丘不通知不遍知癡不能自彼而拋棄不斷心者不能盡苦然則諸比丘通知遍知癡自彼而拋棄斷心者得盡苦世尊説此義此處如是説癡之有情依癡行惡勝觀之人正知斷癡斷於此世決不再來我聞世尊説此義一二一二二我聞應供已説世尊説此諸比丘不通知不遍知忿不能自彼而拋棄不斷心者不能盡苦然則諸比丘通知遍知忿自彼而拋棄斷心者得盡苦世尊説此義此處如是説忿之有情依忿行惡勝觀之人正知斷忿斷於此世決不再來我聞世尊説此義一三一二三我聞應供已説世尊説此諸比丘不通知不遍知覆不能自彼而拋棄不斷心者不能盡苦然則諸比丘通知遍知覆自彼而拋棄斷心者得盡苦世尊説此義此處如是説覆之有情依覆行惡勝觀之人正知斷覆斷於此世決不再來我聞世尊説此義一四一二四我聞應供已説世尊説此諸比丘我不觀他之一蓋如無明蓋依彼無明蓋所覆衆生長時馳騁流轉生死何以故諸比丘依無明蓋所覆衆生長夜馳騁流轉世尊説此義此處如是説他無一法有覆羣生日夜流轉如為癡覆然如捨癡破除暗聚更不流轉亦無他因我聞世尊説此義一五一二五我聞應供已説世尊説此諸比丘我不觀他之一結如愛結依彼結相應有情長夜馳騁流轉何以故諸比丘與愛結相應有情長夜馳騁流轉世尊説此義此處如是説愛為第二長夜流轉生此生彼不超輪回知此災禍愛之生時無執愛心比丘遊行我聞世尊説此義一六一二六我聞應供已説世尊説此諸比丘我為有學未得之人為續住希求無上安穩之比丘等作內緣之言者諸比丘我不觀他有一緣如如理作意之饒益諸比丘如理作意比丘捨離不善修習善世尊説此義此處如是説正當之作意有學比丘法他無斯至要將為得最善比丘已正勉將成苦之滅我聞世尊説此義一七一二七我聞應供已説世尊説此諸比丘我為有學未得之人為續住希求無上安穩之比丘等作外緣之言者諸比丘我不觀他有一緣如善知識之饒益諸比丘善知識之比丘捨離不善修習善世尊説此義此處如是説善知識比丘從順而恭敬守知識言辭有正知正念一切結縛滅次第將遂願我聞世尊説此義一八一二八我聞應供已説世尊説此諸比丘世間有所生一法為衆生之不利為衆生之不安樂為衆生之不義為不利為天人之苦生何之一法為破僧伽即諸比丘僧伽之破壞時有相互諍論事有相互訶責又相互凌蔑又相互棄捨於此處若未敬信者則不敬信又既敬信者為不敬信世尊説此義此處如是説惡者破僧伽永劫生奈落悅衆住非法彼由安穩墮破僧伽和合永劫訶奈落我聞世尊説此義一九一二九我聞應供已説世尊説此諸比丘世間有所生一法為衆生之利為衆生之安樂為衆生之義利為天人之樂生何之一法為僧伽之和合即諸比丘僧伽和合時無相互諍論無相互訶責無相互凌蔑無相互棄捨於此處若未敬信者而起敬信既敬信者而增敬信世尊説此義此處如是説僧伽和合樂有和合之德住法悅和合不由安穩墮僧伽為和合永劫樂天界我聞世尊説此義二一二一我聞應供已説世尊説此諸比丘於世我以自己心差別智分析知有染污心一類人之心此人死時如負重擔將生於地獄所以者何諸比丘實彼心污染則諸比丘於世一類之有情因心被污而身壞死後生於無幸處惡趣墮處奈落世尊説此義此處如是説知世一類人污心比丘之前佛宣義彼心污者應死時將生奈落入地獄如彼放置所拾物實因心污行惡趣我聞世尊説此義攝頌曰癡一一忿一二及覆一三癡一四欲一五有學二一六一七破一八悅一九及人二以稱品第二一集第三品二一一三一我聞應供已説世尊説此諸比丘於世我以自己心差別智分析知淨心一類人之心此人死時如捨重擔生天界所以者何諸比丘彼心之清淨諸比丘則因於世一類有情心淨身壞死後生往善趣天界世尊説此義此處如是説知世一類人淨心佛宣此義比丘前彼心淨者應死時將生善趣往天界如彼放置所拾物實因有情心清淨我聞世尊説此義二二一三二我聞應供已説世尊説此諸比丘勿畏於福諸比丘此為樂希欲愛悅之同義語此即是福諸比丘則我長時行作福時能知長時之希欲愛悅果報之經驗七年間修習慈心七壞成劫間不再來此世諸比丘於退轉劫間正入光音天於進轉劫間生於空梵天宮諸比丘於此處我正見梵天大梵天征服者不被征服者見一切之權威者諸比丘我已三十六次為諸天主帝釋更為法法王戰克四方使住民得安全成就七寶轉輪王已幾百次然對地方王國教説為何諸比丘於彼我如是思惟今我已為如斯大神力者如斯大威力者此於我為如何業果耶為如何業之果報耶於彼我已如是思惟今我已為如斯大神力者如斯大威力者此於我為三業之果為三業之果報為布施調御節制之果報世尊説此義此處如是説彼學未來樂根福又修施靜與慈心三之樂因修此法無瞋樂界智者生我聞世尊説此義二三一三三我聞應供已説世尊説此諸比丘有一法若修習多作為者攝持安住於現法之利與未來之利何之一法為向善法不放逸諸比丘若修習此一法多作為者攝持安住於現法之利與未來之利世尊説此義此處如是説智者作福不放逸智者攝持二之利現法之利未來利持現觀利智者言我聞世尊説此義二四一三四我聞應供已説世尊説此諸比丘一人於一劫馳騁流轉者之骸骨骨之堆積骨之積聚如彼毗補羅山之大若善集彼者且不被壞者可知此世尊説此義此處如是説一人一劫所積骨如山之量大仙宣摩揭陀耆梨跋提靈鷲山毗補羅山比前者高後者大如山之量大仙宣聖諦苦與苦之集苦滅之道超苦事由觀聖八支之道最高七度馳騁後其人已無一切結為滅苦者大仙宣我聞世尊説此義二五一三五我聞應供已説世尊説此諸比丘有一法我説犯此之人無不為惡業何為一法諸比丘彼故為妄語世尊説此義此處如是説犯一法者為妄語無不犯惡遮他世我聞世尊説此義二六一三六我聞應供已説世尊説此諸比丘如我所知若衆生知布施均分之果報則不與而食將不存不住懷慳吝之污心即令彼最後一搏雖有最後一口食或有可愛之物將無不均分何以故諸比丘如我所知衆生不知如此布施均分之果故不與而食住於懷慳吝之污心世尊説此義此處如是説均分果報有大果如大仙宣衆生知以清心拂吝嗇污適時善施與聖者與多人飯施應施施主逝世到天界行天上者滿欲喜均分果報無吝嗇我聞世尊説此義二七一三七我聞應供已説世尊説此諸比丘一切之有依福業不彼慈心解脫十六分之一值惟彼慈心解脫光輝卓絶且為照渡諸比丘譬如一切星光不彼月光十六分之一值惟月光卓絶且為照渡如是諸比丘一切之有依福業不彼慈心解脫十六分之一值惟彼慈心解脫光輝卓絶且為照渡諸比丘譬如秋季雨期最後一月清朗無雲太陽升空中善滅空中一切暗而光輝照渡諸比丘如是一切之有依福業不彼慈心解脫十六分之一值惟彼慈心解脫光輝卓絶且為照渡諸比丘譬如夜至晨時東方之明星照渡光輝諸比丘如是一切之有依福業不彼慈心解脫十六分之一值彼慈心解脫光輝卓絶且為照渡世尊説此義此處如是説若人無限修慈念見生依滅有結少人若有慈無邪心由彼而得為善人向一切人有愍情聖者施行無限福法治衆生於滿地王施如仙續遊行馬之供犧人供犧釘座強飲坐閂房此與善修慈者比不值十六分之一不為殺業不使殺不為征伐不使征一切衆生使為慈對於何人亦無怨我聞世尊説此義攝頌曰定心二一福二二二利二三毗補羅山二四知而故妄語二五知布施二六修習慈二七此七經等與前二十此對一法説集經二十七一集終了有關二法於下敘之二集第一品二八二一一我聞應供已説世尊説此諸比丘成就二法之比丘於現法住於苦有患有惱有焦慮身壞死後惡趣當可期待何之為二為不護諸根門及食不知量諸比丘成就此二法之比丘於現法住於苦有患有惱有焦慮身壞死後惡趣當可期待世尊説此義此處如是説眼耳鼻舌與身意比丘不守此等門食不知量不制根身之苦受心之苦日夜燒身又燒心如此之人住於苦我聞世尊説此義二九二一二我聞應供已説世尊説此諸比丘成就二法之比丘於現法住於樂無患無惱無焦慮