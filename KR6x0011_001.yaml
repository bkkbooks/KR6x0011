丘見法見法者則見我若彼雖隨者大欲心顛倒欲求由無欲清涼不清涼貪婪由離欲更應見遠離解法善學法斯則為智者如深池之底無欲者鎮心無欲者無欲清涼者清涼離欲者離貪更應見接近九三三五四諸比丘此等有三火三之為何為貪火瞋火癡火實諸比丘此等為三火貪之焰染欲燒人已麻痺瞋之焰殺生燒懷惡心人癡之焰燒迷不知聖法者悅我身之人此等不知焰奈落與傍生修羅餓鬼境彼等被魔縛諸苦不得脫日夜依法者正自覺之教常由不淨想消滅貪之焰勝人以恩慈消滅癡之焰以證所得慧消滅癡之焰賢者消滅彼日夜不厭倦無殘越諸苦無殘為圓寂有識聖見者智者依正智善知生滅者不行於後有九四三五五諸比丘比丘應以種種方法考察彼考察彼知解不流於外不使顛倒不安立於內不取愛等不怖未來無有生老死之苦因斷除七之絆比丘切誘因破彼生流轉於彼無後有九五三五六諸比丘此等有三欲生三之為何為現欲化樂欲他化自在欲實諸比丘此等有三欲生有現在欲者向他受用欲他化自在天與化樂諸天智者於欲樂此處彼處有天與人捨離斷除一切欲切愛喜執著切斷難越流無殘為圓寂無殘越諸苦有識聖見者智者依正智善知生滅法不行於後有九六三五七諸比丘與欲之繫縛相應與有之繫縛相應為再來者彼歸來此世之生諸比丘不被欲繫縛之束縛不與有之繫縛相應為不還彼不歸來此世諸比丘不被欲繫縛之束縛不被有繫縛之束縛為阿羅漢應供有漏盡欲絆與生世兩者纏衆生生死於輪回斷欲未盡漏纏綿於生世言為不還者如是斷輪回無慢與後有能得漏盡者此世達彼岸第三誦品九七三五八諸比丘戒善法善慧善比丘完全住於此法律而可謂上人然則諸比丘戒善比丘為如何諸比丘此處有有戒比丘住於波羅提木叉律儀之抑制具足行與行處對微細罪亦見畏懷學學處如是實諸比丘為戒善比丘此為善於戒者又法善者為如何諸比丘於此比丘住於相應七菩提分法之修習行如是實諸比丘為法善比丘此為善於法者又慧善者為如何諸比丘於此比丘盡諸漏於現法自以通知住於實證到達無漏心解脫慧解脫如是實諸比丘成為慧善比丘如是戒善法善慧善者完全住於此法律而言為上人身語意無惡言為善戒者知慚之比丘善法達正覺隨念之比丘言為善法者知苦捨此世言為善慧者無漏之比丘無惱斷輪回一切世間暗言為皆捨者九八三五九諸比丘有此等二施是財施及法施諸比丘此等二施中法施為最勝諸比丘此等有二均分為財均分及法均分諸比丘此等二均分中法均分為最勝諸比丘此有二攝益為財攝益與法攝益諸比丘此等二攝益中法之攝益為最勝世尊宣均分勝施言無上心靜得勝覺智者常不祀談善逝之教聞者心安靜善逝教厚者可淨彼勝的阿羅漢果為勝的九九三五一我聞應供已説世尊説此諸比丘我識婆羅門依法證三明非唯用口語然諸比丘我識婆羅門依法證三明非唯用口語為何諸比丘於此比丘隨念種種之宿住譬如一生二生三生四生五生十生二十生三十生四十生五十生百生千生百千生幾壞劫幾成劫幾壞成劫我於彼處如是名如是姓為如是族如是喫食受如是苦樂為如是壽限彼由其處歿已生於彼處我於彼處如是名如是姓為如是族如是喫食受如是苦樂為如是壽限彼由彼處歿而生於此處如是彼憶相狀而隨念種種宿住此為彼證第一之明無明滅而明生暗黑拂而光明生彼不放逸勇猛如捨己而住時復次諸比丘比丘以清淨超人之天眼見衆生之死生劣勝妙色惡色善趣惡趣之業而知衆生之生實此等之衆生成就身惡行成就語惡行成就意惡行謗聖者懷邪見受邪見之業彼等身壞死後生於無幸處惡趣墮處奈落或實此等衆生成就身妙行成就語妙行成就意妙行不謗聖者懷正見受正見之業彼等身壞死後生於善趣天界如是以清淨超人天眼乃至知應衆生業而生此為彼證第二明無明滅而明生暗黑拂而光明生彼不放逸勇猛如捨己而住時復次諸比丘比丘住於到達實證於現法以自通知盡諸漏無漏之心解脫慧解脫此為彼證第三明無明滅而明生暗黑拂而光明生彼不放逸勇猛如捨己而住時如是我非唯用口語依法識證三明婆羅門世尊説此義此處如是説非只唯口語隨念為宿住我知婆羅門天界惡趣知種種宿住知天界惡趣見或者得盡生神通為牟尼依此三之明三明婆羅門我非只唯口言彼為三明我聞世尊説此義第五品攝頌曰勝信九與生活九一和合九二火九三考察九四生九五欲九六善九七施九八法九九此等共為十三集終了四集一四一我聞應供已説世尊説此諸比丘我為淨手之乞者最後身之婆羅門為無上之內科醫外科醫汝等為我實子由口生由法生依法為法之後繼者非財之後繼者諸比丘此等有二施為財施及法施諸比丘此等二施中法施為最勝諸比丘此等有二均分有財均分及法均分諸比丘此等二均分中法均分為最勝諸比丘此等有二攝益為財攝益及法攝益諸比丘此等二攝益之中法攝益為最勝諸比丘此等有二供養為財供養及法供養諸比丘此二供養中法供養為最勝世尊説此義此處如是説一切有類如來愍法之供養為不惜有之彼岸人天到有情歸命於如來我聞世尊説此義一一四二諸比丘此等四為瑣物而易得且此等為無訶責者四之為何衣之糞掃衣為瑣物而易得且此為無訶責之物諸比丘食物之飯團為瑣物而易得且此為無訶責之物諸比丘坐臥樹下為瑣物而易得且彼為無訶責之物諸比丘作家畜之尿為藥品是瑣物而易得且為無訶責之物實諸比丘此等之四為瑣物而易得且彼為無訶責之物是故諸比丘比丘依瑣物且易得之物而滿足我謂此為沙門分不惡瑣瑣易得物衣食臥藥心滿足就此四物心離苦快樂之敵無能擊比丘知足不放逸沙門保法應修者一二四三諸比丘我説知者見者有有漏之盡非不知者非不見者然諸比丘於知何者見何者有有漏之盡諸比丘此為苦知者見者為盡有漏者諸比丘此為苦之因知者見者為盡有漏者諸比丘此為苦之滅盡知者見者為盡有漏者諸比丘此為到苦滅盡之道知者見者為盡有漏者實諸比丘如是知者見者有有漏之盡勤學有學者能行直道者滅盡煩惱上知根第一智更知解脫者勝有解脫智盡世離輪回生智於漏盡放任懈怠者無智為愚者一切絆離脫不能到涅槃一三四四諸比丘任何之沙門或婆羅門若此是苦不如實知此是苦因不如實知此是苦之滅盡不如實知此是到苦滅盡之道亦不如實知諸比丘我不以彼等為沙門或婆羅門於諸沙門中不思為沙門於諸婆羅門中不思為婆羅門且命終之時於現法彼等不能以自通知沙門之義婆羅門之義未到達實證是故實諸比丘如何之沙門婆羅門若如實知此是苦如實知此是苦之因如實知苦之滅盡如實知苦滅盡之道諸比丘以彼等為沙門或婆羅門且於諸沙門中思為沙門於諸婆羅門中思為婆羅門且命終之時於現法彼等以自通知沙門之義婆羅門之義住於到達實證不知苦與苦之因何處皆苦無不現又復不知苦滅道心慧解脫遺失者不得根絶生老到雖然知苦與苦因何處皆苦無遺者又知苦滅之行道能持心慧解脫者不到生老得根絶一四四五諸比丘具足戒具足定具足慧具足解脫具足解脫智見之比丘為説諭者教授者説示者訓誡者使感動者使滿足者正法完全説明者是故諸比丘我告如是比丘衆所聞之事甚為有益又諸比丘我告近如是比丘衆甚為有益諸比丘我告侍斯比丘衆甚為有益又諸比丘我告隨念斯比丘衆甚為有益又諸比丘我告模倣斯比丘衆甚為有益所以者何諸比丘對斯比丘衆奉仕尊敬扈從者若戒蘊雖未圓成則修習至圓成若定蘊雖未圓成則修習至圓成若慧蘊雖未圓成則修習至圓成若解脫蘊雖未圓成則修習至圓成若解脫智見蘊雖未圓成則修習至圓成如是諸比丘彼等言為教師言為商主言為離過患言為滅暗者言為與明者言為榮光輝耀者言為放光彩者言為揭炬火者言為與光者言為聖者言為具眼者心鎮氣高正生者知因而知悅之生照輝正法放光輝與光與明賢伶俐為具眼者離過者持有正智實聞法賢者深知生之滅不往後有離生死一五四六諸比丘比丘生起渴愛處此等為四愛生起之因四之為何諸比丘比丘因衣服生起渴愛處或諸比丘比丘因團飯生起渴愛處或諸比丘比丘因坐臥處生起渴愛處或諸比丘因此處之有彼處之有比丘生起渴愛處愛為第二者長時有流轉此處彼處有不超輪回有於愛生之時能知此過患無愛心不執比丘將遊行一六四七諸比丘於家父母被子等尊敬彼等之家同於梵天之家諸比丘於家父母被子等尊敬彼等之家同於古天人之家諸比丘於家父母被子等尊敬彼等之家同於先師之家諸比丘於家父母被子等尊敬彼等之家同於應受崇拜者之家諸比丘所謂梵天者此乃父母之謂諸比丘所謂古天人者此乃父母之謂諸比丘所謂先師者此乃父母之謂諸比丘所謂應受崇拜者此乃父母之謂所以者何諸比丘父母是子等大照顧者保護者養育者引導此世者梵天與先師家庭之父母子等應供養愛愍子孫者如此實智者飲食與衣牀塗身與沐浴以之清洗足歸命於父母應與施恭敬智者為如此以之事父母為世所稱讚逝將樂天上一七四八諸比丘婆羅門及居士為卿等之大援助者彼向卿等供養衣服團飯坐臥處疾病之藥品道具等諸比丘雖然卿等亦為婆羅門及居士之大援助者不論如何初善中善終善指示彼等之法具義具文使知無比類圓滿清淨之梵行如是諸比丘相互支持和合將橫斷瀑流為正滅苦而住梵行有家與無家互相合支持無此之安逸為悟正法者住家衣資具由有家者濟危害之避難由無家者受有家在家者善逝為憑藉信阿羅漢者聖慧入三昧於是應修法往至善趣道樂往天界者懷望自成悅一八四九諸比丘若比丘衆欺瞞任性多言虛偽不為專心處者諸比丘此非我比丘諸比丘彼比丘由此離法律又諸比丘彼比丘於此之法律不增長發達開發然實諸比丘不欺瞞不多言賢慧不任性為專心處之比丘諸比丘彼等實是我比丘僧諸比丘彼比丘僧不離此法律諸比丘彼比丘僧於法律達增長發達開展詐頑喧虛偽高傲不專心正自覺者示於法不進步不詐無騷賢不頑為專心正自覺者示於法為進步一九四一諸比丘猶如人於河流樂氣嬉氣前行時岸邊站立之具眼者曰君君何故從河流樂氣嬉氣前行耶此河之下有波有渦鰐魚棲夜叉栖河下有湖水君君至其處死或可受死等之苦彼時諸比丘彼人聞彼之聲以手足橫斷水流而出實諸比丘我説此譬喻欲為教之義此為如斯之義諸比丘所謂河流即此愛之謂諸比丘所謂樂氣嬉氣即此六內處之謂諸比丘所謂河下之湖水即此五下分結之謂諸比丘所謂有波即此忿與絶望之謂諸比丘所謂有渦即此五欲樂之謂諸比丘所謂鰐魚棲夜叉栖即此女人之謂諸比丘所謂橫斷流即此出離之謂諸比丘所謂手足橫斷水流即此精進努力之謂諸比丘所謂立於岸邊之具眼者即此如來應供正自覺者之謂如捨諸欲苦與共來世將有靜安寧心解脫者有正智到處解脫觸涅槃住於梵行識四諦識世之終到彼岸一一四一一諸比丘比丘若步行時生欲尋思瞋尋思害尋思諸比丘若比丘懷彼不斷不拂不除不滅諸比丘如斯比丘雖步行亦言為