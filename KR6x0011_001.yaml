世母或叔母或外叔母或阿闍梨之妻或師之妻將無被識差別恰如山羊羊雄雞野豬犬豺世間將陷於混亂是故諸比丘此等二種之白法護世間故有母或叔母或外叔母或阿闍梨之妻或師之妻被識別世尊説此義此處如是説若人常知慚與愧白法為根免生死若人常近慚與愧增長梵行盡後有我聞世尊説此義四三二二六我聞應供已説世尊説此諸比丘有無生無有無作無為諸比丘若無無生無有無作無為於此處應不能知生有作為之出離是故諸比丘有無生無有無作無為故應能知生有作為之出離世尊説此義此處如是説生有起作為不定老死所襲病巢脆渴愛導因不得悅安越靜疑出離彼無生無起無憂染諸行靜安苦法無我聞世尊説此義四四二二七我聞應供已説世尊説此諸比丘此等有二涅槃何之為二為有餘依涅槃界及無餘依涅槃界諸比丘有餘依涅槃界為何諸比丘於此處應供之比丘已盡漏住於梵行辨應作之事捨負重擔證得自義以盡有結依正智而解脫彼五根安立無傷彼事故經驗喜與不喜能感樂與苦彼為滅貪滅瞋滅癡者諸比丘説彼為有餘依涅槃界然諸比丘無餘依涅槃界為何諸比丘於此應供之比丘已盡漏住於梵行應作已辦捨負重擔證得自義以盡有結依正智而解脫諸比丘然於此生所覺知者已為無喜悅而清涼諸比丘説彼為無餘依涅槃諸比丘此為二涅槃界世尊説此義此處如是説此等二種涅槃界具眼者依無依明初界導者現法有滅盡愛等有餘依他滅未來一切有成為臨終無餘依知此無為之道者盡導有者心解脫逮達法味悅滅者彼已捨此一切見我聞世尊説此義四五二二八我聞應供已説世尊説此諸比丘心喜獨居悅樂獨居內住於心寂靜與隨順不離靜慮成就勝觀增長空處諸比丘心喜獨居悅樂獨居內心寂靜與隨順不離靜慮成就勝觀增長空處而住者可期待二果中之一果於現法智阿羅漢果或有煩惱之餘依成不還果世尊説此義此處如是説心靜慎思專念者勝觀正法離諸欲悅不放逸安穩者因得減損近涅槃我聞世尊説此義四六二二九我聞應供已説世尊説此諸比丘有應學者之勝利有最上之慧有解脫味應住於四念處觀諸比丘有應學者之勝利有最上之慧有解脫味住於至上四念處觀者可期待二果中之一果於現法智阿羅漢果或如有煩惱之餘依成不還果世尊説此義此處如是説圓滿有學不斷法生之滅盡最上慧彼牟尼持最後身捨慢老之達彼岸是故靜慮悅等持熱心者見生滅盡擁兵制魔比丘衆超越為踰生死者我聞世尊説此義四七二二一我聞應供已説世尊説此諸比丘應住於覺悟正念正知等持悅豫勝觀此等於諸善法勝觀時宜而住諸比丘覺悟正念正知等持悅豫勝觀此等於諸善法勝觀時宜之比丘二果中被可期待一果於現法智阿羅漢果或有煩惱之餘依成不還果世尊説此義此處如是説醒者聞此眠者覺醒而勝寢醒無畏醒為正念為正知使勝觀者悅等持彼於時宜修正法集中於心可消暗是故實而得覺醒熱心成為有靜慮生死斷絆賢比丘無上菩提此將證我聞世尊説此義四八二二一一我聞應供已説世尊説此諸比丘彼等二人以不捨彼為墮無幸處奈落者二人者誰凡非梵行者稱為梵行者又凡以無根非梵行誹謗修圓滿清淨之梵行者諸比丘此等二人以不斷彼為墮無幸處奈落者世尊説此義此處如是説將言為而不為人偽言墮落奈落人此之二人身逝後他世等為惡業者頸披袈裟守惡法惡人惡業生奈落破戒無慚食團飯如火灼熱之鐵丸我聞世尊説此義四九二二一二我聞應供已説世尊説此諸比丘依二見所障礙之人與天或執著或超越而具眼者得見然則諸比丘執著者為何諸比丘喜有受天與人之身享樂有説彼滅有法時心不踊躍不晃耀不成安穩不成愛著如是諸比丘或為執著者然則諸比丘超越者為何為有所惱慚恥於有續為嫌厭歡喜有滅此見真實身壞死後被切斷而失無再度死事可謂安穩此最勝此為真實諸比丘如是或者成為超越諸比丘具眼者見為何諸比丘於此見存在者為存在見使存在者為使存在成為入於存在之嫌惡離貪滅盡諸比丘具眼者如是見世尊説此義此處如是説若見存在超存在如實解脫盡有愛知離有非有之愛比丘滅於無後有我聞世尊説此義二集終了攝頌曰二根二八二九二焦惱三三一依戒他世二三二三三無愧三四二詭詐三五三六可憂此等十三七尋思三八教説三九明四慧四一依法四二第五無生四三界四四獨居四五學四六及依覺悟四七無幸處四八及見四九被明共十二三集第一品五三一一我聞應供已説世尊説此諸比丘此等為三不善根三之為何為貪不善根瞋不善根癡不善根諸比丘此等實為三不善根世尊説此義此處如是説貪瞋癡害惡心者如竹自果自身生我聞世尊説此義五一三一二我聞應供已説世尊説此諸比丘此等為三界三之為何為色界無色界滅界諸比丘此等實為三界世尊説此義此處如是説能識色界者不停無色界解脫滅界人已為捨死者無漏正自覺身觸不死界捨死離依著現依著之捨善説此三界無憂離染道我聞世尊説此義五二三一三我聞應供已説世尊説此諸比丘此等為三受三之為何為樂受苦受不苦不樂受諸比丘此等實為三受世尊説此義此處如是説專念熟慮佛弟子思念受與受之生知導滅道止心時滅受無欲入涅槃我聞世尊説此義五三三一四我聞應供已説世尊説此諸比丘此等為三受三之為何樂受苦受不苦不樂受諸比丘此等為三受諸比丘樂受由苦可見苦受由投槍可見不苦不樂受由無常可見諸比丘比丘之樂受雖由苦見苦受由投槍見不苦不樂受由無常見者諸比丘正見